<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for Left L (Taller) -->
    <linearGradient id="logoLeftGrad" x1="23" y1="17" x2="43" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0071e3" />
      <stop offset="100%" stop-color="#5e5ce6" />
    </linearGradient>
    
    <!-- Gradient for Right L (Shorter) -->
    <linearGradient id="logoRightGrad" x1="47" y1="40" x2="67" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3da4ff" />
      <stop offset="100%" stop-color="#0071e3" />
    </linearGradient>

    <!-- Shadow filter to create the 3D overlap effect -->
    <filter id="logoOverlapShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-1.5" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Left L (Taller) -->
  <path d="M 23 17 L 23 72 A 10 10 0 0 0 33 82 L 63 82" 
        stroke="url(#logoLeftGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Right L (Shorter) - rendered on top with a shadow/blend -->
  <path d="M 47 40 L 47 72 A 10 10 0 0 0 57 82 L 78 82" 
        stroke="url(#logoRightGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#logoOverlapShadow)" />
</svg>